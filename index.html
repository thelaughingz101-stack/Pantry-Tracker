// SHOPPING LIST MODAL
// ============================================================
function ShoppingListModal({ lowStock, missing, onClose }) {
  const [copied, setCopied] = useState(false);

  const text = useMemo(() => {
    const lines = [];
    if (lowStock.length) {
      lines.push("LOW STOCK:");
      lowStock.forEach(i => lines.push(`- ${i.name}${i.quantity !== "" ? ` (${formatQty(i.quantity, i.unit)} left)` : ""}`));
      if (missing.length) lines.push("");
    }
    if (missing.length) {
      lines.push("MISSING FOR RECIPES:");
      missing.forEach(m => {
        const amt = m.amount && m.unit ? ` (${m.amount}${TIGHT_UNITS.includes(m.unit) ? "" : " "}${m.unit})` : "";
        lines.push(`- ${m.name}${amt}`);
      });
    }
    return lines.join("\n");
  }, [lowStock, missing]);

  const copy = async () => {
    try { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 1500); } catch {}
  };

  const total = lowStock.length + missing.length;

  return (
    <Sheet onClose={onClose} title="Shopping list">
      {total === 0 ? (
        <div className="py-8 text-center text-stone-500">
          <ShoppingCart size={32} className="mx-auto mb-2 opacity-40" />
          <div className="text-sm">All stocked up. Nothing to buy.</div>
        </div>
      ) : (
        <>
          {lowStock.length > 0 && (
            <div className="mb-4">
              <div className="text-[12px] font-semibold uppercase tracking-wider text-amber-600 mb-2 flex items-center gap-1">
                <AlertTriangle size={12} /> Low stock ({lowStock.length})
              </div>
              <div className="space-y-1.5">
                {lowStock.map(i => (
                  <div key={i.id} className="flex items-center gap-2 px-3 py-2 rounded-lg bg-amber-50 border border-amber-100">
                    <span className="flex-1 text-[14px] font-medium text-stone-800">{i.name}</span>
                    <span className="text-[12px] text-stone-600">{formatQty(i.quantity, i.unit)} left</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {missing.length > 0 && (
            <div>
              <div className="text-[12px] font-semibold uppercase tracking-wider text-rose-600 mb-2">
                Missing for recipes ({missing.length})
              </div>
              <div className="space-y-1.5">
                {missing.map((m, i) => (
                  <div key={i} className="flex items-center gap-2 px-3 py-2 rounded-lg bg-rose-50 border border-rose-100">
                    <span className="flex-1 text-[14px] font-medium text-stone-800">{m.name}</span>
                    {m.amount && (
                      <span className="text-[12px] text-stone-600">
                        {m.amount}{TIGHT_UNITS.includes(m.unit) ? m.unit : (m.unit ? ` ${m.unit}` : "")}
                      </span>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="flex gap-2 mt-6">
            <button onClick={copy}
              className="flex-1 px-4 py-3 rounded-xl bg-stone-900 text-white font-semibold active:scale-[0.98] transition flex items-center justify-center gap-2">
              {copied ? <><Check size={15} /> Copied</> : <><Copy size={15} /> Copy as text</>}
            </button>
          </div>
        </>
      )}
    </Sheet>
  );
}

// ============================================================
// RECEIPT SCAN MODAL — Tesseract.js OCR (free, on-device)
// ============================================================
function ReceiptScanModal({ tab, onClose, onConfirm }) {
  const [stage, setStage] = useState("pick"); // pick | working | review
  const [progress, setProgress] = useState(0);
  const [progressLabel, setProgressLabel] = useState("");
  const [error, setError] = useState("");
  const [rows, setRows] = useState([]);
  const [storeName, setStoreName] = useState("");
  const [defaultLocation, setDefaultLocation] = useState(tab || "fridge");
  const fileRef = useRef(null);

  // lazy-load tesseract from CDN once on first scan
  const ensureTesseract = async () => {
    if (window.Tesseract) return window.Tesseract;
    setProgressLabel("Loading OCR engine…");
    await new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://unpkg.com/tesseract.js@5.1.0/dist/tesseract.min.js";
      s.onload = resolve; s.onerror = () => reject(new Error("Couldn't load OCR engine. Check your internet."));
      document.head.appendChild(s);
    });
    return window.Tesseract;
  };

  const runOCR = async (file) => {
    setError("");
    setStage("working");
    setProgress(0);
    try {
      const Tess = await ensureTesseract();
      setProgressLabel("Reading text…");
      const { data } = await Tess.recognize(file, "eng", {
        logger: (m) => {
          if (m.status === "recognizing text" && typeof m.progress === "number") {
            setProgress(Math.round(m.progress * 100));
          }
        },
      });
      const parsed = parseReceiptText(data.text || "");
      if (parsed.items.length === 0) {
        setError("Couldn't find any line items. Try a clearer, straighter photo.");
        setStage("pick");
        return;
      }
      setStoreName(parsed.store || "");
      setRows(parsed.items.map(p => ({
        ...p,
        keep: true,
        quantity: 1,
        unit: "ea",
        location: defaultLocation,
        foodGroup: "",
      })));
      setStage("review");
    } catch (e) {
      setError(e.message || "OCR failed.");
      setStage("pick");
    }
  };

  const handleFile = (e) => {
    const f = e.target.files?.[0]; if (f) runOCR(f);
  };

  const handlePaste = async () => {
    try {
      if (!navigator.clipboard?.read) throw new Error("Paste isn't supported in this browser.");
      const items = await navigator.clipboard.read();
      for (const it of items) {
        for (const t of it.types) {
          if (t.startsWith("image/")) {
            const blob = await it.getType(t);
            return runOCR(blob);
          }
        }
      }
      throw new Error("No image in clipboard. Copy an image first.");
    } catch (e) {
      setError(e.message || "Couldn't paste");
    }
  };

  const updateRow = (i, patch) => setRows(rs => rs.map((r, idx) => idx === i ? { ...r, ...patch } : r));
  const removeRow = (i) => setRows(rs => rs.filter((_, idx) => idx !== i));

  const submit = () => {
    const kept = rows.filter(r => r.keep && r.name.trim());
    if (!kept.length) return;
    onConfirm(kept.map(r => ({
      name: r.name.trim(),
      quantity: Number(r.quantity) || 1,
      unit: r.unit || "ea",
      location: r.location,
      foodGroup: r.foodGroup,
      price: r.price === "" || r.price == null ? null : Number(r.price),
      store: storeName.trim(),
      onSale: false,
      lowStockThreshold: 1,
      priceHistory: [],
    })));
  };

  return (
    <Sheet onClose={onClose} title={stage === "review" ? "Review items" : "Scan receipt"}>
      {stage === "pick" && (
        <>
          <p className="text-[13px] text-stone-600 mb-4">
            Snap or upload a clear photo of your receipt. OCR runs on your device — first scan downloads the engine (~4MB).
          </p>
          <div className="flex flex-col gap-2">
            <button onClick={() => fileRef.current?.click()}
              className="h-12 rounded-xl bg-stone-900 text-white font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition">
              <Camera size={16} /> Take or upload photo
            </button>
            <button onClick={handlePaste}
              className="h-12 rounded-xl bg-stone-100 text-stone-800 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition">
              <Clipboard size={16} /> Paste from clipboard
            </button>
            <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} className="hidden" />
          </div>
          {error && <div className="mt-3 text-[13px] text-rose-600">{error}</div>}
          <div className="mt-4 text-[11px] text-stone-500 leading-relaxed">
            <strong>Tips for better results:</strong> straighten the receipt, good lighting, no shadows over the text, fill the frame.
            Faded thermal receipts may not parse well — you can still add items manually.
          </div>
        </>
      )}

      {stage === "working" && (
        <div className="py-12 flex flex-col items-center gap-4">
          <div className="h-12 w-12 rounded-full border-4 border-stone-200 border-t-stone-900 animate-spin" />
          <div className="text-[13px] font-semibold text-stone-700">{progressLabel || "Reading…"}</div>
          {progress > 0 && (
            <div className="w-48 h-1.5 rounded-full bg-stone-100 overflow-hidden">
              <div className="h-full bg-stone-900 transition-all" style={{ width: `${progress}%` }} />
            </div>
          )}
          <div className="text-[11px] text-stone-500">First-time scan downloads the OCR engine.</div>
        </div>
      )}

      {stage === "review" && (
        <>
          <Field label="Store name (applied to all)">
            <Input value={storeName} onChange={setStoreName} placeholder="Market Basket" />
          </Field>
          <Field label="Default location" className="mt-3">
            <div className="flex gap-1.5">
              {[["fridge","Fridge"],["pantry","Pantry"],["freezer","Freezer"]].map(([k,l]) => (
                <button key={k} onClick={() => {
                  setDefaultLocation(k);
                  setRows(rs => rs.map(r => ({ ...r, location: k })));
                }}
                  className={`flex-1 px-3 py-2 rounded-xl text-[12px] font-semibold transition border ${
                    defaultLocation === k ? "bg-stone-900 text-white border-stone-900" : "bg-white text-stone-700 border-stone-200"
                  }`}>{l}</button>
              ))}
            </div>
          </Field>

          <div className="mt-4 mb-2 flex items-center justify-between">
            <span className="text-[12px] font-semibold uppercase tracking-wider text-stone-500/80">
              {rows.filter(r => r.keep).length}/{rows.length} selected
            </span>
            <button onClick={() => setRows(rs => rs.map(r => ({ ...r, keep: !rs.every(x => x.keep) })))}
              className="text-[12px] font-semibold text-stone-700">Toggle all</button>
          </div>

          <div className="space-y-1.5 max-h-[42vh] overflow-y-auto -mx-1 px-1">
            {rows.map((r, i) => (
              <div key={i} className={`flex items-center gap-1.5 p-2 rounded-xl border ${r.keep ? "bg-white border-stone-200" : "bg-stone-50 border-stone-100 opacity-60"}`}>
                <button onClick={() => updateRow(i, { keep: !r.keep })}
                  className={`h-5 w-5 rounded-md border-2 shrink-0 flex items-center justify-center ${r.keep ? "bg-stone-900 border-stone-900" : "border-stone-300"}`}>
                  {r.keep && <Check size={12} strokeWidth={3} className="text-white" />}
                </button>
                <input value={r.name} onChange={(e) => updateRow(i, { name: e.target.value })}
                  placeholder="Item name"
                  className="flex-1 min-w-0 bg-transparent text-[13px] font-medium outline-none px-1" />
                <input type="number" inputMode="decimal" step="0.01"
                  value={r.price ?? ""} onChange={(e) => updateRow(i, { price: e.target.value })}
                  placeholder="$"
                  className="w-14 bg-stone-50 rounded-md px-1.5 py-1 text-[12px] outline-none text-right" />
                <button onClick={() => removeRow(i)}
                  className="h-7 w-7 text-stone-400 hover:text-rose-500 flex items-center justify-center shrink-0">
                  <X size={14} />
                </button>
              </div>
            ))}
          </div>
          <div className="mt-2 text-[11px] text-stone-500">
            Quantity defaults to 1 each — you can edit each item afterwards to set real quantities, units, food groups, and calories.
          </div>

          <div className="flex gap-2 mt-5">
            <button onClick={() => setStage("pick")}
              className="px-4 py-3 rounded-xl bg-stone-100 text-stone-700 font-semibold active:scale-95 transition">Back</button>
            <button onClick={submit}
              disabled={!rows.some(r => r.keep && r.name.trim())}
              className="flex-1 px-4 py-3 rounded-xl bg-stone-900 text-white font-semibold disabled:opacity-40 active:scale-[0.98] transition">
              Add {rows.filter(r => r.keep).length} items
            </button>
          </div>
        </>
      )}
    </Sheet>
  );
}

// Receipt text parser: pulls store name + likely line items
function parseReceiptText(text) {
  const lines = text.split(/\r?\n/).map(l => l.replace(/\s+/g, " ").trim()).filter(Boolean);
  const SKIP_WORDS = /\b(SUBTOTAL|TOTAL|TAX|CASH|CHANGE|CREDIT|DEBIT|VISA|MASTERCARD|AMEX|TENDER|BALANCE|AMOUNT|PAYMENT|CARD|AUTH|REF|ITEM(S)?|QTY|TRANSACTION|RECEIPT|THANK|WELCOME|REWARDS|MEMBER|SAVED|SAVINGS|DISCOUNT|COUPON|TOTAL\s+SAVINGS|GRAND|NET|CHANGE\s+DUE|ROUNDING)\b/i;
  const items = [];
  // store guess: first non-empty line that's not a number/address/skip
  const store = (lines.find(l => /^[A-Za-z][A-Za-z\s&'.]+$/.test(l) && !SKIP_WORDS.test(l) && l.length >= 3 && l.length <= 30) || "").trim();

  // price pattern at end of line: optional $, optional sign, digits, decimal
  const PRICE_RE = /(?:^|\s)([\$£€]?-?\d{1,4}[.,]\d{2})\s*[A-Z]?\s*$/;

  for (const line of lines) {
    if (SKIP_WORDS.test(line)) continue;
    const m = line.match(PRICE_RE);
    if (!m) continue;
    let priceStr = m[1].replace(/[\$£€]/g, "").replace(",", ".");
    const price = Number(priceStr);
    if (isNaN(price) || price <= 0 || price > 999) continue;
    let name = line.slice(0, line.length - m[0].length).trim();
    // strip leading SKU/numeric codes
    name = name.replace(/^\d{3,}\s+/, "").replace(/^[A-Z0-9]{4,}\s+/, "");
    // strip trailing weight indicators
    name = name.replace(/\s+\d+(\.\d+)?\s*(LB|OZ|KG|G|ML|L)\.?$/i, "");
    name = name.replace(/\s+@\s+\$?\d+(\.\d+)?$/, "");
    if (name.length < 2) continue;
    if (/^\d+$/.test(name)) continue;
    // title-case the result
    name = name.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
    items.push({ name, price });
  }

  // dedupe — if same name appears twice, sum prices? simpler: keep both, user can edit
  return { store, items };
}

// ============================================================
// DATA MODAL — export / import backup
// ============================================================
function DataModal({ itemCount, recipeCount, onClose, onImported }) {
  const [busy, setBusy] = useState(false);
  const [status, setStatus] = useState("");
  const [pendingImport, setPendingImport] = useState(null); // { data, summary }
  const fileRef = useRef(null);

  const handleExport = async () => {
    setBusy(true); setStatus("");
    try {
      const data = await exportAllData();
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const ts = new Date().toISOString().slice(0, 10);
      const filename = `pantry-backup-${ts}.json`;

      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);

      setStatus(`Exported ${data.items.length} items + ${data.recipes.length} recipes.`);
    } catch (e) {
      setStatus("Export failed: " + (e.message || "unknown error"));
    } finally {
      setBusy(false);
    }
  };

  const handleFile = async (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    setBusy(true); setStatus("");
    try {
      const text = await f.text();
      const data = JSON.parse(text);
      if (!Array.isArray(data.items) || !Array.isArray(data.recipes)) {
        throw new Error("Not a valid pantry backup file.");
      }
      setPendingImport({
        data,
        summary: `${data.items.length} items, ${data.recipes.length} recipes${data.exportedAt ? ` (exported ${new Date(data.exportedAt).toLocaleDateString()})` : ""}`,
      });
    } catch (err) {
      setStatus("Couldn't read file: " + (err.message || "invalid JSON"));
    } finally {
      setBusy(false);
      // reset input so picking the same file again still triggers onChange
      e.target.value = "";
    }
  };

  const confirmImport = async () => {
    if (!pendingImport) return;
    setBusy(true); setStatus("");
    try {
      await importAllData(pendingImport.data);
      setPendingImport(null);
      onImported();
    } catch (e) {
      setStatus("Import failed: " + (e.message || "unknown error"));
    } finally {
      setBusy(false);
    }
  };

  return (
    <Sheet onClose={onClose} title="Backup & restore">
      <div className="text-[13px] text-stone-600 mb-4">
        You currently have <strong>{itemCount} items</strong> and <strong>{recipeCount} recipes</strong>.
      </div>

      {!pendingImport ? (
        <>
          <button onClick={handleExport} disabled={busy}
            className="w-full h-12 rounded-xl bg-stone-900 text-white font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition disabled:opacity-50">
            <Download size={16} /> Export everything as JSON
          </button>
          <p className="text-[11px] text-stone-500 mt-2 mb-4 px-1">
            Saves a backup file to your downloads. Includes items, recipes, your background, and blur level.
          </p>

          <div className="border-t border-stone-200 my-4" />

          <button onClick={() => fileRef.current?.click()} disabled={busy}
            className="w-full h-12 rounded-xl bg-stone-100 text-stone-800 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition disabled:opacity-50">
            <Upload size={16} /> Import from backup file
          </button>
          <input ref={fileRef} type="file" accept="application/json,.json" onChange={handleFile} className="hidden" />
          <p className="text-[11px] text-stone-500 mt-2 px-1">
            Replaces all current data with the backup contents. You'll get a confirmation step first.
          </p>

          {status && <div className="mt-4 text-[12px] text-stone-700 bg-stone-50 rounded-lg p-3">{status}</div>}
        </>
      ) : (
        <>
          <div className="p-4 rounded-xl bg-amber-50 border border-amber-200 mb-4">
            <div className="flex items-start gap-2">
              <AlertTriangle size={16} className="text-amber-600 mt-0.5 shrink-0" />
              <div className="text-[13px] text-amber-900">
                <strong>This will replace everything.</strong> Your current {itemCount} items and {recipeCount} recipes will be gone.
              </div>
            </div>
          </div>
          <div className="text-[13px] text-stone-700 mb-4">
            Importing: <strong>{pendingImport.summary}</strong>
          </div>
          <div className="flex gap-2">
            <button onClick={() => setPendingImport(null)} disabled={busy}
              className="px-4 py-3 rounded-xl bg-stone-100 text-stone-700 font-semibold active:scale-95 transition">
              Cancel
            </button>
            <button onClick={confirmImport} disabled={busy}
              className="flex-1 px-4 py-3 rounded-xl bg-rose-500 text-white font-semibold active:scale-[0.98] transition disabled:opacity-50">
              Replace & import
            </button>
          </div>
          {status && <div className="mt-4 text-[12px] text-rose-700 bg-rose-50 rounded-lg p-3">{status}</div>}
        </>
      )}
    </Sheet>
  );
}

// ============================================================
// SUGGESTER MODAL — pick something from stock with filters
// ============================================================
function SuggesterModal({ items, onClose }) {
  const [groupFilters, setGroupFilters] = useState(new Set());
  const [calMin, setCalMin] = useState("");
  const [calMax, setCalMax] = useState("");
  const [pick, setPick] = useState(null);
  const [seed, setSeed] = useState(0);

  const candidates = useMemo(() => {
    return items.filter(it => {
      const q = Number(it.quantity);
      if (isNaN(q) || q <= 0) return false;
      if (groupFilters.size > 0 && !groupFilters.has(it.foodGroup)) return false;
      const kcal = itemCalories(it);
      if (calMin !== "" && kcal < Number(calMin)) return false;
      if (calMax !== "" && kcal > Number(calMax)) return false;
      return true;
    });
  }, [items, groupFilters, calMin, calMax, seed]);

  const roll = () => {
    if (!candidates.length) { setPick(null); return; }
    const idx = Math.floor(Math.random() * candidates.length);
    setPick(candidates[idx]);
    setSeed(s => s + 1);
  };

  const toggleGroup = (id) => {
    setGroupFilters(s => {
      const next = new Set(s);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
    setPick(null);
  };

  return (
    <Sheet onClose={onClose} title="What should I eat?">
      <p className="text-[13px] text-stone-600 mb-3">Filter by food group and/or calories, then roll for a random item from your stock.</p>

      <Field label="Food groups (none = any)">
        <div className="flex gap-1 flex-wrap">
          {FOOD_GROUPS.map(g => {
            const Icon = g.icon;
            const active = groupFilters.has(g.id);
            return (
              <button key={g.id} onClick={() => toggleGroup(g.id)}
                className={`inline-flex items-center gap-1 px-2.5 h-8 rounded-full text-[12px] font-semibold transition border ${
                  active ? "bg-stone-900 text-white border-stone-900" : "bg-white text-stone-700 border-stone-200"
                }`}>
                <Icon size={12} strokeWidth={2.2} />
                <span>{g.label}</span>
              </button>
            );
          })}
        </div>
      </Field>

      <div className="flex gap-2 mt-3">
        <Field label="Min kcal" className="flex-1">
          <Input type="number" value={calMin} onChange={(v) => { setCalMin(v); setPick(null); }} placeholder="any" />
        </Field>
        <Field label="Max kcal" className="flex-1">
          <Input type="number" value={calMax} onChange={(v) => { setCalMax(v); setPick(null); }} placeholder="any" />
        </Field>
      </div>

      <div className="text-[11px] text-stone-500 mt-2">
        {candidates.length} {candidates.length === 1 ? "item" : "items"} match your filters.
      </div>

      {pick && (
        <div className="mt-4 p-4 rounded-2xl bg-emerald-50 border border-emerald-200 flex items-center gap-3 pop-in">
          <div className="h-14 w-14 rounded-full overflow-hidden bg-white flex items-center justify-center text-stone-500 shrink-0">
            {(() => {
              if (pick.imageUrl) return <img src={pick.imageUrl} className="h-full w-full object-cover" alt="" />;
              const G = groupIcon(pick.foodGroup);
              if (G) return <G size={22} strokeWidth={2} />;
              return <Package size={22} strokeWidth={2} />;
            })()}
          </div>
          <div className="flex-1 min-w-0">
            <div className="text-[16px] font-bold text-stone-900 truncate">{pick.name}</div>
            <div className="text-[12px] text-stone-600 flex items-center gap-2">
              <span>{formatQty(pick.quantity, pick.unit)}</span>
              {itemCalories(pick) > 0 && (
                <span className="flex items-center gap-0.5"><Zap size={10} className="text-amber-600" strokeWidth={2.5} />{formatKcal(itemCalories(pick))} kcal</span>
              )}
              <span className="capitalize text-stone-500">· {pick.location}</span>
            </div>
          </div>
        </div>
      )}

      {!pick && candidates.length === 0 && (groupFilters.size > 0 || calMin || calMax) && (
        <div className="mt-4 p-4 rounded-2xl bg-stone-50 border border-stone-200 text-[13px] text-stone-500 text-center">
          Nothing in stock matches those filters.
        </div>
      )}

      <div className="flex gap-2 mt-5">
        <button onClick={onClose}
          className="px-4 py-3 rounded-xl bg-stone-100 text-stone-700 font-semibold active:scale-95 transition">Done</button>
        <button onClick={roll}
          disabled={candidates.length === 0}
          className="flex-1 px-4 py-3 rounded-xl bg-stone-900 text-white font-semibold disabled:opacity-40 active:scale-[0.98] transition flex items-center justify-center gap-2">
          <Dice5 size={16} /> {pick ? "Roll again" : "Roll"}
        </button>
      </div>
    </Sheet>
  );
}

// ============================================================
// SHARED — Sheet, Field, Input, Select
// ============================================================
function Sheet({ title, onClose, children }) {
  useEffect(() => {
    const onEsc = (e) => e.key === "Escape" && onClose();
    document.addEventListener("keydown", onEsc);
    return () => document.removeEventListener("keydown", onEsc);
  }, [onClose]);

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center" role="dialog">
      <div onClick={onClose} className="absolute inset-0 bg-stone-900/50 backdrop-blur-sm" />
      <div className="relative w-full max-w-[440px] bg-white rounded-t-3xl sm:rounded-3xl slide-up max-h-[92vh] overflow-y-auto">
        <div className="sticky top-0 bg-white/95 backdrop-blur z-10 flex items-center justify-between px-5 pt-4 pb-3 border-b border-stone-100">
          <h3 className="text-[17px] font-bold tracking-tight">{title}</h3>
          <button onClick={onClose} className="h-8 w-8 rounded-full bg-stone-100 flex items-center justify-center active:scale-90">
            <X size={16} />
          </button>
        </div>
        <div className="p-5 pb-8">{children}</div>
      </div>
    </div>
  );
}

function Field({ label, children, className = "" }) {
  return (
    <label className={`block ${className}`}>
      <span className="block text-[11px] font-semibold uppercase tracking-wider text-stone-500/80 mb-1.5">{label}</span>
      {children}
    </label>
  );
}

function Input({ value, onChange, placeholder, type = "text", maxLength }) {
  return (
    <input
      type={type}
      inputMode={type === "number" ? "decimal" : undefined}
      value={value}
      onChange={(e) => onChange(e.target.value)}
      placeholder={placeholder}
      maxLength={maxLength}
      className="w-full bg-white rounded-xl px-4 py-3 text-[15px] outline-none border border-stone-200 focus:border-stone-400 transition"
    />
  );
}

function Select({ value, onChange, options }) {
  return (
    <select value={value} onChange={(e) => onChange(e.target.value)}
      className="w-full bg-white rounded-xl px-3 py-3 text-[14px] outline-none border border-stone-200 focus:border-stone-400 transition appearance-none">
      {options.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
    </select>
  );
}


import ReactDOM from "react-dom/client";
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
