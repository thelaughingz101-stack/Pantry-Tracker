// STORAGE
// ============================================================
const ITEMS_KEY = "fridgepantry:items";
const RECIPES_KEY = "fridgepantry:recipes";
const BG_KEY = "fridgepantry:bg";
const BLUR_KEY = "fridgepantry:blur";

// Works inside Claude (window.storage) and outside (localStorage) — lazy check
// at every call so we don't miss window.storage if it's attached after module init.
const storage = {
  async get(k) {
    if (typeof window !== "undefined" && window.storage?.get) {
      try { return await window.storage.get(k); } catch { return null; }
    }
    try { const v = localStorage.getItem(k); return v != null ? { key: k, value: v } : null; } catch { return null; }
  },
  async set(k, v) {
    if (typeof window !== "undefined" && window.storage?.set) {
      try { return await window.storage.set(k, v); } catch { return null; }
    }
    try { localStorage.setItem(k, v); return { key: k, value: v }; } catch { return null; }
  },
  async delete(k) {
    if (typeof window !== "undefined" && window.storage?.delete) {
      try { return await window.storage.delete(k); } catch { return null; }
    }
    try { localStorage.removeItem(k); return { key: k, deleted: true }; } catch { return null; }
  },
};

async function loadItems() {
  try { const r = await storage.get(ITEMS_KEY); return r ? JSON.parse(r.value).map(normalizeItem) : []; }
  catch { return []; }
}
async function saveItems(items) { try { await storage.set(ITEMS_KEY, JSON.stringify(items)); } catch {} }
async function loadRecipes() {
  try { const r = await storage.get(RECIPES_KEY); return r ? JSON.parse(r.value).map(normalizeRecipe) : []; }
  catch { return []; }
}
async function saveRecipes(recipes) { try { await storage.set(RECIPES_KEY, JSON.stringify(recipes)); } catch {} }

// ============================================================
// SCHEMA NORMALIZERS — handle legacy data
// ============================================================
// Export everything as JSON (items + recipes + bg + blur)
async function exportAllData() {
  const [items, recipes, bg, blur] = await Promise.all([
    storage.get(ITEMS_KEY).then(r => r?.value ? JSON.parse(r.value) : []).catch(() => []),
    storage.get(RECIPES_KEY).then(r => r?.value ? JSON.parse(r.value) : []).catch(() => []),
    storage.get(BG_KEY).then(r => r?.value || null).catch(() => null),
    storage.get(BLUR_KEY).then(r => r?.value || null).catch(() => null),
  ]);
  return {
    version: 1,
    exportedAt: new Date().toISOString(),
    items, recipes,
    settings: { backgroundImage: bg, blur },
  };
}

// Import a backup, replacing all current data after user confirms
async function importAllData(payload) {
  if (!payload || typeof payload !== "object") throw new Error("Invalid backup file.");
  if (!Array.isArray(payload.items) || !Array.isArray(payload.recipes)) {
    throw new Error("Backup file is missing items or recipes.");
  }
  await storage.set(ITEMS_KEY, JSON.stringify(payload.items));
  await storage.set(RECIPES_KEY, JSON.stringify(payload.recipes));
  if (payload.settings?.backgroundImage) {
    await storage.set(BG_KEY, payload.settings.backgroundImage);
  }
  if (payload.settings?.blur != null) {
    await storage.set(BLUR_KEY, String(payload.settings.blur));
  }
}
function migrateFoodGroup(id) {
  if (id === "milk") return "dairy";
  if (id === "fats") return "other";
  return id || "";
}

function normalizeItem(it) {
  return {
    id: it.id,
    name: it.name || "",
    imageUrl: it.imageUrl || "",
    emoji: it.emoji || "",
    quantity: it.quantity ?? "",
    unit: it.unit ?? "ea",
    location: it.location || "fridge",
    foodGroup: migrateFoodGroup(it.foodGroup),
    calories: it.calories ?? "",          // number per `caloriesPer` unit
    caloriesPer: it.caloriesPer || "100g", // "100g" | "ea" | "serving"
    price: it.price ?? null,
    store: it.store || "",
    onSale: !!it.onSale,
    lowStockThreshold: it.lowStockThreshold ?? 1,
    priceHistory: Array.isArray(it.priceHistory) ? it.priceHistory : [],
  };
}
function normalizeRecipe(r) {
  return {
    id: r.id,
    name: r.name || "",
    imageUrl: r.imageUrl || "",
    mealType: r.mealType || "lunch",
    prepTime: r.prepTime || 0,
    cookTime: r.cookTime || 0,
    link: r.link || "",
    ingredients: (r.ingredients || []).map(ing =>
      typeof ing === "string"
        ? { name: ing, amount: "", unit: "" }
        : { name: ing.name || "", amount: ing.amount ?? "", unit: ing.unit || "" }
    ),
  };
}

// ============================================================
// IMAGE COMPRESSION
// ============================================================
function compressImage(file, maxSize = 400, quality = 0.78) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let { width, height } = img;
        if (width > height) {
          if (width > maxSize) { height = (height * maxSize) / width; width = maxSize; }
        } else {
          if (height > maxSize) { width = (width * maxSize) / height; height = maxSize; }
        }
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// pull image from clipboard (modern Clipboard API; works on iOS 13.4+ + desktop)
async function pasteImageFromClipboard() {
  if (!navigator.clipboard?.read) throw new Error("Clipboard API not supported in this browser.");
  const items = await navigator.clipboard.read();
  for (const item of items) {
    for (const type of item.types) {
      if (type.startsWith("image/")) {
        const blob = await item.getType(type);
        return new File([blob], "pasted." + type.split("/")[1], { type });
      }
    }
  }
  throw new Error("No image found in clipboard. Copy an image first, then try again.");
}

function formatQty(q, u) {
  if (q === "" || q == null) return "—";
  if (!u || u === "ea") return String(q);
  return TIGHT_UNITS.includes(u) ? `${q}${u}` : `${q} ${u}`;
}
function formatPrice(p) {
  if (p == null || p === "") return "";
  const n = Number(p);
  if (isNaN(n)) return "";
  return `$${n.toFixed(2)}`;
}

// total calories currently in stock for an item
function itemCalories(it) {
  const cal = Number(it.calories);
  const qty = Number(it.quantity);
  if (isNaN(cal) || isNaN(qty) || cal <= 0 || qty <= 0) return 0;
  if (it.caloriesPer === "100g") {
    // assumes quantity is in grams or ml — best-effort, falls back to grams
    if (it.unit === "g" || it.unit === "ml") return Math.round(cal * (qty / 100));
    if (it.unit === "kg" || it.unit === "l")  return Math.round(cal * (qty * 10));
    if (it.unit === "oz") return Math.round(cal * (qty * 28.35 / 100));
    if (it.unit === "lb") return Math.round(cal * (qty * 453.6 / 100));
    return 0; // unit doesn't match per-100g basis
  }
  // "ea" or "serving" — calories is per unit/serving, multiply by quantity
  return Math.round(cal * qty);
}

// helpers for a quick "you have X kcal stocked" summary
function totalCalories(items) {
  return items.reduce((sum, it) => sum + itemCalories(it), 0);
}

// count how many items have calorie data set
function caloriesCoverage(items) {
  if (!items.length) return { with: 0, total: 0 };
  const w = items.filter(i => Number(i.calories) > 0).length;
  return { with: w, total: items.length };
}

const formatKcal = (n) => n >= 10000 ? `${(n/1000).toFixed(1)}k` : n.toLocaleString();

// match an ingredient name to a stock item (case-insensitive substring both ways)
function findStockMatch(ingName, items) {
  const n = (ingName || "").trim().toLowerCase();
  if (!n) return null;
  return items.find(it => {
    const s = it.name.trim().toLowerCase();
    return s === n || s.includes(n) || n.includes(s);
  }) || null;
}

function ingredientStatus(ing, items) {
  const match = findStockMatch(ing.name, items);
  if (!match) return { status: "missing", match: null };
  if (ing.amount && ing.unit && ing.unit === match.unit) {
    const have = Number(match.quantity);
    const need = Number(ing.amount);
    if (!isNaN(have) && !isNaN(need)) {
      if (have < need) return { status: "low", match, shortBy: need - have };
    }
  }
  return { status: "have", match };
}

        const [i, r] = await Promise.all([loadItems(), loadRecipes()]);
        if (cancelled) return;
        setItems(i);
        setRecipes(r);
      } catch {}
      if (!cancelled) setLoaded(true);

      try {
        const b = await storage.get(BG_KEY);
        if (!cancelled && b?.value) setCustomBg(b.value);
      } catch {}
      try {
        const bl = await storage.get(BLUR_KEY);
        if (!cancelled && bl?.value) {
          const n = Number(bl.value);
          if (!isNaN(n)) setBlur(n);
        }
      } catch {}
    })();

    return () => { cancelled = true; clearTimeout(safety); };
  }, []);

  const handleBgUpload = async (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    try {
      const data = await compressImage(f, 900, 0.6);
      setCustomBg(data);
      await storage.set(BG_KEY, data);
    } catch {}
  };

  const resetBg = async () => {
    setCustomBg(null);
    try { await storage.delete(BG_KEY); } catch {}
  };

  const updateBlur = (n) => {
    setBlur(n);
    storage.set(BLUR_KEY, String(n)).catch(() => {});
  };

  const filtered = items.filter(i =>
    i.location === tab && (!foodFilter || i.foodGroup === foodFilter)
  );

  const totalKcal = useMemo(() => totalCalories(items), [items]);
  const kcalCoverage = useMemo(() => caloriesCoverage(items), [items]);

  // food group fulfillment — across ALL locations (do I have meat in the house?)
  const groupFulfilled = useMemo(() => {
    const set = new Set();
    for (const it of items) {
      const q = Number(it.quantity);
      if (it.foodGroup && !isNaN(q) && q > 0) set.add(it.foodGroup);
    }
    return set;
  }, [items]);

  const mealTypes = ["breakfast", "lunch", "dinner", "snack"];
  const byMeal = useMemo(() => {
    const m = {};
    mealTypes.forEach(t => (m[t] = recipes.filter(r => r.mealType === t)));
    return m;
  }, [recipes, recipeOrder]);

  // CRUD
  const upsertItem = async (newItem) => {
    let next;
    if (newItem.id) {
      next = items.map(i => {
        if (i.id !== newItem.id) return i;
        // if price changed, push old to history
        const oldP = i.price, newP = newItem.price;
        let history = newItem.priceHistory || i.priceHistory || [];
        if (oldP != null && oldP !== "" && Number(oldP) !== Number(newP) && newP != null && newP !== "") {
          history = [{ price: Number(oldP), store: i.store, onSale: i.onSale, date: new Date().toISOString() }, ...history].slice(0, 20);
        }
        return { ...newItem, priceHistory: history };
      });
    } else {
      next = [...items, normalizeItem({ ...newItem, id: uid() })];
    }
    setItems(next); await saveItems(next);
  };
  const deleteItem = async (id) => {
    const next = items.filter(i => i.id !== id);
    setItems(next); await saveItems(next);
  };

  // bulk add from receipt scan
  const bulkAddItems = async (newOnes) => {
    const next = [...items, ...newOnes.map(it => normalizeItem({ ...it, id: uid() }))];
    setItems(next); await saveItems(next);
  };
  const upsertRecipe = async (recipe) => {
    const next = recipe.id
      ? recipes.map(r => (r.id === recipe.id ? recipe : r))
      : [...recipes, normalizeRecipe({ ...recipe, id: uid() })];
    setRecipes(next); await saveRecipes(next);
  };
  const deleteRecipe = async (id) => {
    const next = recipes.filter(r => r.id !== id);
    setRecipes(next); await saveRecipes(next);
  };
  const shuffleRecipes = () => {
    setRecipes(prev => [...prev].sort(() => Math.random() - 0.5));
    setRecipeOrder(x => x + 1);
  };

  // cook a recipe — apply deductions
  const applyCook = async (recipe, deductions) => {
    let next = [...items];
    for (const d of deductions) {
      next = next.map(i => {
        if (i.id !== d.itemId) return i;
        const newQty = Math.max(0, Number(i.quantity) - Number(d.amount));
        return { ...i, quantity: newQty };
      });
    }
    setItems(next); await saveItems(next);
  };

  // shopping list aggregation
  const shoppingList = useMemo(() => {
    const lowStock = items.filter(i => {
      const q = Number(i.quantity);
      return !isNaN(q) && q <= Number(i.lowStockThreshold || 0);
    });
    const missing = [];
    const seen = new Set();
    for (const r of recipes) {
      for (const ing of r.ingredients) {
        const key = ing.name.trim().toLowerCase();
        if (!key || seen.has(key)) continue;
        const match = findStockMatch(ing.name, items);
        if (!match) {
          missing.push({ name: ing.name, amount: ing.amount, unit: ing.unit, fromRecipes: [r.name] });
          seen.add(key);
        }
      }
    }
    return { lowStock, missing };
  }, [items, recipes]);

  return (
    <div className="min-h-screen w-full font-app text-stone-800 antialiased relative overflow-hidden">
      {/* photo background */}
      <div
        aria-hidden
        className="fixed inset-0 -z-20"
        style={{
          backgroundImage: `url(${customBg || BG_DATA})`,
          backgroundSize: "cover",
          backgroundPosition: "center",
          filter: `blur(${blur}px) saturate(1.05)`,
          transform: "scale(1.12)",
        }}
      />
      {/* dark warm scrim for legibility */}
      <div
        aria-hidden
        className="fixed inset-0 -z-10"
        style={{
          background: `
            linear-gradient(180deg, rgba(28,22,18,0.55) 0%, rgba(28,22,18,0.35) 40%, rgba(28,22,18,0.55) 100%),
            radial-gradient(80% 60% at 50% 30%, rgba(255,210,180,0.15), transparent 70%)
          `,
        }}
      />

      {/* font + utility styles */}
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap');
        .font-app { font-family: 'Noto Sans', ui-sans-serif, system-ui, sans-serif; letter-spacing: -0.005em; }
        .glass {
          background: rgba(255,255,255,0.78);
          backdrop-filter: blur(18px) saturate(1.1);
          -webkit-backdrop-filter: blur(18px) saturate(1.1);
          border: 1px solid rgba(255,255,255,0.55);
        }
        .glass-strong {
          background: rgba(255,255,255,0.88);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border: 1px solid rgba(255,255,255,0.7);
        }
        .pill-row { background: rgba(255,255,255,0.62); border: 1px solid rgba(255,255,255,0.7); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { scrollbar-width: none; }
        @keyframes pop { 0% { transform: scale(.96); opacity: 0 } 100% { transform: scale(1); opacity: 1 } }
        .pop-in { animation: pop .25s cubic-bezier(.2,.8,.2,1) both; }
        @keyframes slideUp { 0% { transform: translateY(100%); } 100% { transform: translateY(0); } }
        .slide-up { animation: slideUp .28s cubic-bezier(.2,.8,.2,1) both; }
      `}</style>

      <div
        className="mx-auto w-full max-w-[440px] lg:max-w-[1080px] px-4 lg:grid lg:grid-cols-2 lg:gap-5 lg:items-start"
        style={{
          paddingTop: "max(20px, env(safe-area-inset-top))",
          paddingBottom: "max(32px, calc(env(safe-area-inset-bottom) + 16px))",
          paddingLeft: "max(16px, env(safe-area-inset-left))",
          paddingRight: "max(16px, env(safe-area-inset-right))",
        }}
      >
        {!loaded ? (
          <div className="h-screen flex items-center justify-center text-white/80 lg:col-span-2">Loading…</div>
        ) : (
          <>
            {/* =============== STOCK SECTION =============== */}
            <section className="glass rounded-3xl p-4">
              <div className="flex items-end justify-between mb-3">
                <h2 className="text-[22px] font-bold tracking-tight leading-none text-stone-900">What I have in</h2>
                <div className="flex gap-1.5">
                  <button
                    onClick={() => setSuggesterOpen(true)}
                    className="h-9 w-9 rounded-full bg-white/80 text-stone-700 flex items-center justify-center active:scale-95 transition"
                    aria-label="Suggest item"
                    title="Suggest something to eat from stock"
                  >
                    <Salad size={15} strokeWidth={2.3} />
                  </button>
                  <button
                    onClick={() => setScanOpen(true)}
                    className="h-9 w-9 rounded-full bg-white/80 text-stone-700 flex items-center justify-center active:scale-95 transition"
                    aria-label="Scan receipt"
                    title="Scan a receipt"
                  >
                    <ScanLine size={15} strokeWidth={2.3} />
                  </button>
                  <button
                    onClick={() => setShoppingOpen(true)}
                    className="h-9 w-9 rounded-full bg-white/80 text-stone-700 flex items-center justify-center active:scale-95 transition relative"
                    aria-label="Shopping list"
                  >
                    <ShoppingCart size={16} strokeWidth={2.3} />
                    {(shoppingList.lowStock.length + shoppingList.missing.length) > 0 && (
                      <span className="absolute -top-0.5 -right-0.5 h-4 min-w-[16px] px-1 rounded-full bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center">
                        {shoppingList.lowStock.length + shoppingList.missing.length}
                      </span>
                    )}
                  </button>
                  <button
                    onClick={() => setItemModal({ mode: "new", item: { location: tab } })}
                    className="h-9 w-9 rounded-full bg-stone-900 text-white flex items-center justify-center active:scale-95 transition"
                    aria-label="Add item"
                  >
                    <Plus size={18} strokeWidth={2.5} />
                  </button>
                </div>
              </div>

              {/* calorie summary — total kcal stocked across the house */}
              {totalKcal > 0 && (
                <div className="flex items-center gap-2 mb-3 px-3 py-2 rounded-xl bg-stone-900/5 border border-stone-900/5">
                  <Zap size={14} strokeWidth={2.3} className="text-amber-600 shrink-0" />
                  <span className="text-[13px] font-semibold text-stone-800 tabular-nums">{formatKcal(totalKcal)} kcal</span>
                  <span className="text-[11px] text-stone-500">stocked</span>
                  {kcalCoverage.with < kcalCoverage.total && (
                    <span className="ml-auto text-[10px] text-stone-500">
                      {kcalCoverage.with}/{kcalCoverage.total} tracked
                    </span>
                  )}
                </div>
              )}

              {/* tabs */}
              <div className="flex gap-1 mb-3">
                {[["fridge","Fridge"],["pantry","Pantry"],["freezer","Freezer"]].map(([k,label]) => (
                  <button
                    key={k}
                    onClick={() => setTab(k)}
                    className={`px-4 py-2 rounded-full text-[14px] font-semibold transition ${
                      tab === k
                        ? "bg-white text-stone-900 shadow-[0_1px_3px_rgba(0,0,0,0.06)]"
                        : "bg-transparent text-stone-700/80"
                    }`}
                  >
                    {label}
                  </button>
                ))}
              </div>

              {/* food group filter — tap a group to filter, ✓ when stocked anywhere */}
              <div className="flex gap-1.5 mb-3 overflow-x-auto no-scrollbar -mx-1 px-1">
                {FOOD_GROUPS.map(g => {
                  const fulfilled = groupFulfilled.has(g.id);
                  const active = foodFilter === g.id;
                  const Icon = g.icon;
                  return (
                    <button
                      key={g.id}
                      onClick={() => setFoodFilter(active ? null : g.id)}
                      className={`shrink-0 inline-flex items-center gap-1 px-2.5 h-7 rounded-full text-[12px] font-semibold transition border ${
                        active
                          ? "bg-stone-900 text-white border-stone-900"
                          : fulfilled
                          ? "bg-emerald-50 text-emerald-800 border-emerald-200"
                          : "bg-white/55 text-stone-500 border-white/70"
                      }`}
                      title={fulfilled ? `${g.label} — in stock` : `${g.label} — none stocked`}
                    >
                      <Icon size={12} strokeWidth={2.2} />
                      <span>{g.label}</span>
                      {fulfilled && !active && <Check size={10} strokeWidth={3.5} className="text-emerald-600 -ml-0.5" />}
                    </button>
                  );
                })}
              </div>

              {/* items list */}
              <div className="space-y-2 max-h-[260px] overflow-y-auto no-scrollbar pr-1">
                {filtered.length === 0 ? (
                  <EmptyItems tab={tab} onAdd={() => setItemModal({ mode: "new", item: { location: tab } })} />
                ) : filtered.map(item => (
                  <ItemRow
                    key={item.id}
                    item={item}
                    onClick={() => setItemModal({ mode: "edit", item })}
                  />
                ))}
              </div>
            </section>

            {/* =============== RECIPES SECTION =============== */}
            <section className="mt-5 lg:mt-0 glass rounded-3xl p-4">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-2">
                  <h2 className="text-[22px] font-bold tracking-tight leading-none text-stone-900">Recommended</h2>
                  <button
                    onClick={shuffleRecipes}
                    className="text-stone-700/70 hover:text-stone-900 active:scale-90 transition"
                    aria-label="Shuffle"
                  >
                    <RotateCcw size={16} strokeWidth={2.5} />
                  </button>
                </div>
                <button
                  onClick={() => setRecipeModal({ mode: "new", recipe: { mealType: "lunch", ingredients: [] } })}
                  className="h-9 w-9 rounded-full bg-stone-900 text-white flex items-center justify-center active:scale-95 transition"
                  aria-label="Add recipe"
                >
                  <Plus size={18} strokeWidth={2.5} />
                </button>
              </div>

              {recipes.length === 0 ? (
                <EmptyRecipes onAdd={() => setRecipeModal({ mode: "new", recipe: { mealType: "lunch", ingredients: [] } })} />
              ) : (
                <div className="space-y-4">
                  {mealTypes.map(meal => byMeal[meal].length > 0 && (
                    <MealRow
                      key={meal}
                      title={meal[0].toUpperCase() + meal.slice(1)}
                      recipes={byMeal[meal]}
                      items={items}
                      onEdit={(r) => setRecipeModal({ mode: "edit", recipe: r })}
                      onCook={(r) => setCookModal(r)}
                    />
                  ))}
                </div>
              )}
            </section>
          </>
        )}
      </div>

      {/* FLOATING DATA BUTTON — bottom-left
          - mobile: dim (30% opacity), tap-friendly
          - desktop: invisible until you hover the bottom-left corner
       */}
      <div
        className="fixed z-40 group"
        style={{
          bottom: "max(0px, env(safe-area-inset-bottom))",
          left: "max(0px, env(safe-area-inset-left))",
        }}
      >
        {/* desktop hover hitbox — invisible 80x80 catcher in the corner */}
        <div className="hidden lg:block absolute bottom-0 left-0 w-20 h-20 pointer-events-auto" />
        <button
          onClick={() => setDataOpen(true)}
          className="pointer-events-auto absolute h-9 w-9 rounded-full bg-white/80 text-stone-700 backdrop-blur flex items-center justify-center active:scale-95 shadow-[0_2px_8px_rgba(0,0,0,0.18)] transition-opacity duration-200 opacity-30 hover:opacity-100 lg:opacity-0 lg:group-hover:opacity-100"
          style={{ bottom: "16px", left: "16px" }}
          aria-label="Export or import data"
          title="Export / import backup"
        >
          <Download size={15} strokeWidth={2.3} />
        </button>
      </div>

      {/* FLOATING CONTROLS — bottom-right, outside the cards */}
      <div
        className="fixed z-40 flex flex-col items-end gap-2 pointer-events-none"
        style={{
          bottom: "max(16px, calc(env(safe-area-inset-bottom) + 8px))",
          right: "max(16px, env(safe-area-inset-right))",
        }}
      >
        {blurOpen && (
          <div className="pointer-events-auto glass-strong rounded-2xl px-3 py-2 flex items-center gap-2 shadow-[0_4px_16px_rgba(0,0,0,0.18)]">
            <span className="text-[11px] font-semibold text-stone-700 tracking-wide uppercase">Blur</span>
            <input
              type="range" min="0" max="60" step="1"
              value={blur}
              onChange={(e) => updateBlur(Number(e.target.value))}
              className="w-28 accent-stone-800"
            />
            <span className="text-[11px] font-semibold text-stone-700 tabular-nums w-9 text-right">{blur}px</span>
          </div>
        )}
        <div className="pointer-events-auto flex gap-1.5">
          <button
            onClick={() => setBlurOpen(b => !b)}
            className={`h-9 w-9 rounded-full flex items-center justify-center active:scale-95 transition shadow-[0_2px_8px_rgba(0,0,0,0.18)] ${
              blurOpen ? "bg-stone-900 text-white" : "bg-white/80 text-stone-700 backdrop-blur"
            }`}
            aria-label="Adjust background blur"
            title="Adjust background blur"
          >
            <SlidersHorizontal size={15} strokeWidth={2.3} />
          </button>
          <button
            onClick={() => bgFileRef.current?.click()}
            onContextMenu={(e) => { e.preventDefault(); if (customBg) resetBg(); }}
            className="h-9 w-9 rounded-full bg-white/80 text-stone-700 backdrop-blur flex items-center justify-center active:scale-95 transition shadow-[0_2px_8px_rgba(0,0,0,0.18)]"
            aria-label="Change background"
            title={customBg ? "Tap: change · Long-press / right-click: reset" : "Set custom background"}
          >
            <ImagePlus size={15} strokeWidth={2.3} />
          </button>
          <input ref={bgFileRef} type="file" accept="image/*" onChange={handleBgUpload} className="hidden" />
        </div>
      </div>

      {/* MODALS */}
      {itemModal && (
        <ItemModal
          mode={itemModal.mode}
          initial={normalizeItem(itemModal.item)}
          onClose={() => setItemModal(null)}
          onSave={async (it) => { await upsertItem(it); setItemModal(null); }}
          onDelete={async (id) => { await deleteItem(id); setItemModal(null); }}
        />
      )}
      {recipeModal && (
        <RecipeModal
          mode={recipeModal.mode}
          initial={normalizeRecipe(recipeModal.recipe)}
          items={items}
          onClose={() => setRecipeModal(null)}
          onSave={async (r) => { await upsertRecipe(r); setRecipeModal(null); }}
          onDelete={async (id) => { await deleteRecipe(id); setRecipeModal(null); }}
          onCook={(r) => { setRecipeModal(null); setCookModal(r); }}
        />
      )}
      {cookModal && (
        <CookModal
          recipe={cookModal}
          items={items}
          onClose={() => setCookModal(null)}
          onConfirm={async (deductions) => { await applyCook(cookModal, deductions); setCookModal(null); }}
        />
      )}
      {shoppingOpen && (
        <ShoppingListModal
          lowStock={shoppingList.lowStock}
          missing={shoppingList.missing}
          onClose={() => setShoppingOpen(false)}
        />
      )}
      {scanOpen && (
        <ReceiptScanModal
          tab={tab}
          onClose={() => setScanOpen(false)}
          onConfirm={async (rows) => { await bulkAddItems(rows); setScanOpen(false); }}
        />
      )}
      {suggesterOpen && (
        <SuggesterModal
          items={items}
          onClose={() => setSuggesterOpen(false)}
        />
      )}
      {dataOpen && (
        <DataModal
          itemCount={items.length}
          recipeCount={recipes.length}
          onClose={() => setDataOpen(false)}
          onImported={async () => {
            // reload from storage after import
            const [i, r] = await Promise.all([loadItems(), loadRecipes()]);
            setItems(i); setRecipes(r);
            try { const b = await storage.get(BG_KEY); if (b?.value) setCustomBg(b.value); } catch {}
            try { const bl = await storage.get(BLUR_KEY); if (bl?.value) setBlur(Number(bl.value) || 19); } catch {}
            setDataOpen(false);
          }}
        />
      )}
    </div>
  );
}

// ============================================================
// ITEM ROW
// ============================================================
function ItemRow({ item, onClick }) {
  const q = Number(item.quantity);
  const lowStock = !isNaN(q) && q <= Number(item.lowStockThreshold || 0);
  const lastPrice = item.priceHistory?.[0]?.price;
  let priceTrend = null;
  if (item.price != null && item.price !== "" && lastPrice != null) {
    const cur = Number(item.price), prev = Number(lastPrice);
    if (!isNaN(cur) && !isNaN(prev) && cur !== prev) {
      priceTrend = cur > prev ? "up" : "down";
    }
  }

  return (
    <button
      onClick={onClick}
      className="pill-row w-full flex items-center gap-3 pr-2 pl-1.5 py-1.5 rounded-full text-left active:scale-[0.99] transition"
    >
      <div className="h-11 w-11 rounded-full overflow-hidden bg-stone-200/70 flex items-center justify-center shrink-0 text-stone-500">
        {(() => {
          if (item.imageUrl) return <img src={item.imageUrl} alt="" className="h-full w-full object-cover" />;
          const G = groupIcon(item.foodGroup);
          if (G) return <G size={18} strokeWidth={2} />;
          return <Package size={18} strokeWidth={2} />;
        })()}
      </div>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-1.5">
          <span className="text-[15px] font-semibold text-stone-800 truncate">{item.name}</span>
          {lowStock && (
            <span className="shrink-0 inline-flex items-center justify-center h-4 w-4 rounded-full bg-amber-500/95 text-white" title="Low stock">
              <AlertTriangle size={10} strokeWidth={2.8} />
            </span>
          )}
          {item.onSale && (
            <span className="shrink-0 inline-flex items-center gap-0.5 px-1.5 h-4 rounded-full bg-rose-500 text-white text-[9px] font-bold tracking-wide">
              SALE
            </span>
          )}
        </div>
        {((item.price != null && item.price !== "") || item.store || itemCalories(item) > 0) && (
          <div className="flex items-center gap-1.5 -mt-0.5">
            {item.price != null && item.price !== "" && (
              <span className="text-[11px] text-stone-600 font-medium flex items-center gap-0.5">
                {formatPrice(item.price)}
                {priceTrend === "up" && <ArrowUp size={9} className="text-rose-600" strokeWidth={3} />}
                {priceTrend === "down" && <ArrowDown size={9} className="text-emerald-600" strokeWidth={3} />}
              </span>
            )}
            {item.store && (
              <span className="text-[11px] text-stone-500/90 truncate">· {item.store}</span>
            )}
            {itemCalories(item) > 0 && (
              <span className="text-[11px] text-stone-500 flex items-center gap-0.5">
                · <Zap size={9} className="text-amber-600" strokeWidth={2.5} />{formatKcal(itemCalories(item))}
              </span>
            )}
          </div>
        )}
      </div>
      <span className="px-3 py-1 rounded-full bg-white/90 text-[13px] font-semibold text-stone-700 shrink-0">
        {formatQty(item.quantity, item.unit)}
      </span>
    </button>
  );
}

function EmptyItems({ tab, onAdd }) {
  return (
    <button
      onClick={onAdd}
      className="w-full pill-row rounded-2xl py-6 flex flex-col items-center justify-center gap-2 text-stone-600 hover:text-stone-900 transition"
    >
      <Plus size={20} />
      <span className="text-sm font-medium">Add your first {tab} item</span>
    </button>
  );
}

// ============================================================
// MEAL ROW
// ============================================================
function MealRow({ title, recipes, items, onEdit, onCook }) {
  const scrollRef = useRef(null);
  return (
    <div>
      <div className="flex items-center justify-between mb-2 px-1">
        <h3 className="text-[16px] font-bold text-stone-800 tracking-tight">{title}</h3>
        <button
          onClick={() => scrollRef.current?.scrollBy({ left: 220, behavior: "smooth" })}
          className="text-stone-700/70 hover:text-stone-900 active:scale-90 transition"
          aria-label="Scroll right"
        >
          <ChevronRight size={20} strokeWidth={2.5} />
        </button>
      </div>
      <div ref={scrollRef} className="flex gap-3 overflow-x-auto no-scrollbar -mx-4 px-4 snap-x snap-mandatory">
        {recipes.map(r => (
          <RecipeCard key={r.id} recipe={r} items={items} onEdit={onEdit} onCook={onCook} />
        ))}
      </div>
    </div>
  );
}

// ============================================================
// RECIPE CARD
// ============================================================
function RecipeCard({ recipe, items, onEdit, onCook }) {
  const total = recipe.ingredients?.length || 0;
  let have = 0;
  for (const ing of recipe.ingredients || []) {
    if (ingredientStatus(ing, items).status === "have") have++;
  }
  const pct = total ? have / total : 0;
  const canCook = total > 0 && have === total;

  const openLink = (e) => { e.stopPropagation(); if (recipe.link) window.open(recipe.link, "_blank", "noopener,noreferrer"); };

  return (
    <div
      onClick={() => onEdit(recipe)}
      className="snap-start shrink-0 w-[230px] h-[270px] rounded-2xl overflow-hidden relative active:scale-[0.99] transition cursor-pointer pop-in"
      style={{
        backgroundImage: recipe.imageUrl ? `url(${recipe.imageUrl})` : "linear-gradient(135deg,#c8d4b8,#e8c9b6)",
        backgroundSize: "cover", backgroundPosition: "center",
      }}
    >
      {recipe.link && (
        <button
          onClick={openLink}
          className="absolute top-2 right-2 h-8 w-8 rounded-full bg-white/85 backdrop-blur flex items-center justify-center text-stone-800 active:scale-90"
          aria-label="Open recipe link"
        >
          <ExternalLink size={14} strokeWidth={2.5} />
        </button>
      )}
      {canCook && (
        <button
          onClick={(e) => { e.stopPropagation(); onCook(recipe); }}
          className="absolute top-2 left-2 h-8 px-3 rounded-full bg-emerald-500 text-white flex items-center gap-1 active:scale-90 text-[11px] font-bold"
        >
          <Flame size={11} strokeWidth={3} /> COOK
        </button>
      )}

      <div className="absolute inset-x-0 bottom-0 p-3 pt-12"
           style={{ background: "linear-gradient(to top, rgba(28,22,18,0.92) 0%, rgba(28,22,18,0.7) 55%, rgba(28,22,18,0) 100%)" }}>
        <h4 className="text-white font-bold text-[15px] leading-tight mb-2 line-clamp-2">{recipe.name}</h4>
        <div className="flex items-center gap-3 text-white/95">
          <div className="flex items-center gap-1.5">
            <Ring pct={pct} />
            <div className="leading-tight">
              <div className="text-[13px] font-bold">{have}/{total}</div>
              <div className="text-[10px] opacity-80 -mt-0.5">ingredients</div>
            </div>
          </div>
          {(recipe.prepTime || recipe.cookTime) && (
            <div className="leading-tight">
              <div className="text-[13px] font-bold">
                {recipe.prepTime || 0} + {recipe.cookTime || 0} mins
              </div>
              <div className="text-[10px] opacity-80 -mt-0.5">prep + cook</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function Ring({ pct }) {
  const r = 11, c = 2 * Math.PI * r;
  const off = c - pct * c;
  return (
    <svg width="28" height="28" viewBox="0 0 28 28">
      <circle cx="14" cy="14" r={r} stroke="rgba(255,255,255,0.3)" strokeWidth="2.5" fill="none" />
      <circle cx="14" cy="14" r={r} stroke="white" strokeWidth="2.5" fill="none"
        strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
        transform="rotate(-90 14 14)" />
    </svg>
  );
}

function EmptyRecipes({ onAdd }) {
  return (
    <button onClick={onAdd}
      className="glass-strong w-full rounded-2xl py-10 flex flex-col items-center justify-center gap-2 text-stone-600 hover:text-stone-900 transition">
      <Plus size={22} />
      <span className="text-sm font-medium">Add your first recipe</span>
    </button>
  );
}

// ============================================================
// ITEM MODAL — with details + price subtab

function ItemModal({ mode, initial, onClose, onSave, onDelete }) {

  const [quantity, setQuantity] = useState(initial.quantity ?? "");

  const [imageUrl, setImageUrl] = useState(initial.imageUrl || "");
  const [emoji, setEmoji] = useState(initial.emoji || "");
  const [foodGroup, setFoodGroup] = useState(initial.foodGroup || "");
  const [price, setPrice] = useState(initial.price ?? "");
  const [store, setStore] = useState(initial.store || "");
  const [onSale, setOnSale] = useState(!!initial.onSale);
  const [lowStockThreshold, setLowStockThreshold] = useState(initial.lowStockThreshold ?? 1);
  const [calories, setCalories] = useState(initial.calories ?? "");
  const [caloriesPer, setCaloriesPer] = useState(initial.caloriesPer || "100g");
  const [busy, setBusy] = useState(false);
  const [pasteErr, setPasteErr] = useState("");
  const fileRef = useRef(null);

  const handleFile = async (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    setBusy(true);
    try { setImageUrl(await compressImage(f)); } finally { setBusy(false); }
  };

  const handlePaste = async () => {
    setPasteErr("");
    setBusy(true);
    try {
      const f = await pasteImageFromClipboard();
      setImageUrl(await compressImage(f));
    } catch (err) {
      setPasteErr(err.message || "Couldn't paste");
      setTimeout(() => setPasteErr(""), 3500);
    } finally {
      setBusy(false);
    }
  };

  // listen for desktop Ctrl/Cmd+V image paste anywhere in the modal
  useEffect(() => {
    const onPaste = async (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const it of items) {
        if (it.type?.startsWith("image/")) {
          const f = it.getAsFile();
          if (f) {
            e.preventDefault();
            setBusy(true);
            try { setImageUrl(await compressImage(f)); } finally { setBusy(false); }
            return;
          }
        }
      }
    };
    document.addEventListener("paste", onPaste);
    return () => document.removeEventListener("paste", onPaste);
  }, []);

  const submit = () => {
    if (!name.trim() || quantity === "") return;
    onSave({
      id: initial.id,
      name: name.trim(),
      quantity: Number(quantity),
      unit, location, imageUrl, emoji, foodGroup,
      price: price === "" ? null : Number(price),
      store: store.trim(),
      onSale,
      lowStockThreshold: Number(lowStockThreshold) || 0,
      calories: calories === "" ? "" : Number(calories),
      caloriesPer,
      priceHistory: initial.priceHistory || [],

    <Sheet onClose={onClose} title={mode === "edit" ? "Edit item" : "Add item"}>
      {/* sub-tabs */}
      <div className="flex gap-1 mb-4 p-1 rounded-full bg-stone-100">
        {[["details","Details"],["price","Price & history"]].map(([k,l]) => (
          <button key={k} onClick={() => setView(k)}
            className={`flex-1 py-1.5 rounded-full text-[13px] font-semibold transition ${
              view === k ? "bg-white text-stone-900 shadow-sm" : "text-stone-500"
            }`}>
            {l}
          </button>
        ))}
      </div>

      {view === "details" ? (
        <>
          <div className="flex flex-col items-center mb-4">
            <button onClick={() => fileRef.current?.click()}
              className="h-24 w-24 rounded-full bg-white border border-stone-200 overflow-hidden flex items-center justify-center relative text-stone-500">
              {(() => {
                if (imageUrl) return <img src={imageUrl} className="h-full w-full object-cover" alt="" />;
                const G = groupIcon(foodGroup);
                if (G) return <G size={28} strokeWidth={2} />;
                return <Camera size={24} className="text-stone-400" />;
              })()}
              {busy && <div className="absolute inset-0 bg-white/60 flex items-center justify-center text-xs">…</div>}
            </button>
            <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} className="hidden" />
            <div className="flex gap-2 mt-2">
              <button type="button" onClick={() => fileRef.current?.click()}
                className="inline-flex items-center gap-1 px-3 h-7 rounded-full bg-stone-100 text-stone-700 text-[12px] font-semibold active:scale-95 transition">
                <ImagePlus size={12} strokeWidth={2.5} /> Upload
              </button>
              <button type="button" onClick={handlePaste}
                className="inline-flex items-center gap-1 px-3 h-7 rounded-full bg-stone-100 text-stone-700 text-[12px] font-semibold active:scale-95 transition">
                <Clipboard size={12} strokeWidth={2.5} /> Paste
              </button>
            </div>
            {pasteErr && <div className="mt-1.5 text-[11px] text-rose-600 max-w-[260px] text-center">{pasteErr}</div>}
          </div>

          <Field label="Name">
            <Input value={name} onChange={setName} placeholder="Chicken breast" />
          </Field>

          <div className="flex gap-2 mt-3">
            <Field label="Quantity" className="flex-1">
              <Input type="number" value={quantity} onChange={setQuantity} placeholder="380" />
            </Field>
            <Field label="Unit" className="w-[110px]">
              <Select value={unit} onChange={setUnit} options={UNITS.map(u => [u, u === "ea" ? "each" : u])} />
            </Field>
          </div>

          <Field label="Location" className="mt-3">
            <div className="flex gap-1.5">
              {[["fridge","Fridge"],["pantry","Pantry"],["freezer","Freezer"]].map(([k,l]) => (
                <button key={k} onClick={() => setLocation(k)}
                  className={`flex-1 px-3 py-2.5 rounded-xl text-[13px] font-semibold transition border ${
                    location === k ? "bg-stone-900 text-white border-stone-900" : "bg-white text-stone-700 border-stone-200"
                  }`}>
                  {l}
                </button>
              ))}
            </div>
          </Field>

          <Field label="Food group" className="mt-3">
            <div className="flex gap-1 flex-wrap">
              <button onClick={() => setFoodGroup("")}
                className={`inline-flex items-center px-2.5 h-8 rounded-full text-[12px] font-semibold transition border ${
                  foodGroup === "" ? "bg-stone-900 text-white border-stone-900" : "bg-white text-stone-500 border-stone-200"
                }`}>
                None
              </button>
              {FOOD_GROUPS.map(g => {
                const Icon = g.icon;
                return (
                  <button key={g.id} onClick={() => setFoodGroup(g.id)}
                    className={`inline-flex items-center gap-1 px-2.5 h-8 rounded-full text-[12px] font-semibold transition border ${
                      foodGroup === g.id ? "bg-stone-900 text-white border-stone-900" : "bg-white text-stone-700 border-stone-200"
                    }`}>
                    <Icon size={12} strokeWidth={2.2} />
                    <span>{g.label}</span>
                  </button>
                );
              })}
            </div>
          </Field>

          <Field label="Calories (optional)" className="mt-3">
            <div className="flex gap-2">
              <div className="relative flex-1">
                <Zap size={13} className="absolute left-3 top-1/2 -translate-y-1/2 text-amber-600" />
                <input
                  type="number" inputMode="numeric"
                  value={calories}
                  onChange={(e) => setCalories(e.target.value)}
                  placeholder="kcal"
                  className="w-full bg-white rounded-xl pl-9 pr-4 py-3 text-[15px] outline-none border border-stone-200 focus:border-stone-400 transition"
                />
              </div>
              <select
                value={caloriesPer}
                onChange={(e) => setCaloriesPer(e.target.value)}
                className="w-[110px] bg-white rounded-xl px-3 py-3 text-[14px] outline-none border border-stone-200 focus:border-stone-400 transition appearance-none">
                <option value="100g">per 100g</option>
                <option value="ea">per item</option>
                <option value="serving">per serving</option>
              </select>
            </div>
          </Field>

          <Field label="Low-stock flag at or below" className="mt-3">
            <Input type="number" value={lowStockThreshold} onChange={setLowStockThreshold} placeholder="1" />
          </Field>
        </>
      ) : (
        <>
          <div className="flex gap-2">
            <Field label="Current price" className="flex-1">
              <div className="relative">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 font-semibold">$</span>
                <input
                  type="number" inputMode="decimal" step="0.01"
                  value={price}
                  onChange={(e) => setPrice(e.target.value)}
                  placeholder="0.00"
                  className="w-full bg-white rounded-xl pl-7 pr-4 py-3 text-[15px] outline-none border border-stone-200 focus:border-stone-400 transition"
                />
              </div>
            </Field>
            <Field label="On sale?" className="w-[110px]">
              <button onClick={() => setOnSale(s => !s)}
                className={`w-full h-[46px] rounded-xl border text-[13px] font-semibold transition flex items-center justify-center gap-1.5 ${
                  onSale ? "bg-rose-500 text-white border-rose-500" : "bg-white text-stone-500 border-stone-200"
                }`}>
                {onSale && <Check size={14} strokeWidth={3} />} SALE
              </button>
            </Field>
          </div>

          <Field label="Store" className="mt-3">
            <div className="relative">
              <Store size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400" />
              <input
                value={store}
                onChange={(e) => setStore(e.target.value)}

          {/* history */}

            {(initial.priceHistory || []).length === 0 ? (
              <div className="text-[13px] text-stone-500 italic px-1 py-3">No previous prices yet — once you change the price, the old one is logged here.</div>
            ) : (
              <div className="space-y-1.5">
                {(initial.priceHistory || []).map((h, idx) => {
                  const next = idx === 0 ? Number(initial.price) : Number(initial.priceHistory[idx - 1].price);
                  const direction = !isNaN(next) && next > h.price ? "up" : (next < h.price ? "down" : null);
                  return (
                    <div key={idx} className="flex items-center justify-between bg-stone-50 rounded-lg px-3 py-2 text-[13px]">
                      <div className="flex items-center gap-2">
                        <span className="font-semibold text-stone-800">{formatPrice(h.price)}</span>
                        {h.onSale && <span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full bg-rose-100 text-rose-700">SALE</span>}
                        {h.store && <span className="text-stone-500">· {h.store}</span>}
                      </div>
                      <div className="flex items-center gap-2 text-stone-500 text-[11px]">
                        {direction === "up" && <ArrowUp size={11} className="text-rose-600" strokeWidth={3} />}
                        {direction === "down" && <ArrowDown size={11} className="text-emerald-600" strokeWidth={3} />}
                        {new Date(h.date).toLocaleDateString()}

                    </div>
                  );

              </div>
            )}
          </div>
        </>
      )}

      <div className="flex gap-2 mt-6">
        {mode === "edit" && (
          <button onClick={() => onDelete(initial.id)}
            className="px-4 py-3 rounded-xl bg-rose-50 text-rose-600 font-semibold flex items-center gap-2 active:scale-95 transition">
            <Trash2 size={16} />
          </button>
        )}
        <button onClick={submit} disabled={!name.trim() || quantity === ""}
          className="flex-1 px-4 py-3 rounded-xl bg-stone-900 text-white font-semibold disabled:opacity-40 active:scale-[0.98] transition">
          {mode === "edit" ? "Save" : `Add to ${location}`}
        </button>
      </div>
    </Sheet>
  );
}

    try {
      const f = await pasteImageFromClipboard();
      setImageUrl(await compressImage(f, 700, 0.78));
    } catch (err) {
      setPasteErr(err.message || "Couldn't paste");
      setTimeout(() => setPasteErr(""), 3500);
    } finally {
      setBusy(false);

          const f = it.getAsFile();
          if (f) {
            e.preventDefault();
            setBusy(true);
            try { setImageUrl(await compressImage(f, 700, 0.78)); } finally { setBusy(false); }

                </select>

                  className="h-7 w-7 rounded-lg text-stone-400 hover:text-rose-500 flex items-center justify-center shrink-0">
                  <X size={14} />
                </button>
              </div>
            );
          })}
        </div>
        <button onClick={addIng}
          className="mt-2 text-[12px] font-semibold text-stone-700 hover:text-stone-900 flex items-center gap-1">
          <Plus size={13} /> Add ingredient
        </button>
      </div>

      <div className="flex gap-2 mt-6">
        {mode === "edit" && (
          <button onClick={() => onDelete(initial.id)}
            className="px-4 py-3 rounded-xl bg-rose-50 text-rose-600 font-semibold flex items-center gap-2 active:scale-95 transition">
            <Trash2 size={16} />
          </button>
        )}
        {canCook && (
          <button onClick={() => onCook({ ...initial, name: name.trim(), ingredients })}
            className="px-4 py-3 rounded-xl bg-emerald-500 text-white font-semibold flex items-center gap-2 active:scale-95 transition">
            <Flame size={16} /> Cook
          </button>
        )}
        <button onClick={submit} disabled={!name.trim()}
          className="flex-1 px-4 py-3 rounded-xl bg-stone-900 text-white font-semibold disabled:opacity-40 active:scale-[0.98] transition">
          {mode === "edit" ? "Save" : "Add recipe"}
        </button>
      </div>
    </Sheet>
  );
}

// ============================================================
// COOK MODAL — confirm deductions before cooking
// ============================================================
function CookModal({ recipe, items, onClose, onConfirm }) {
  // build deduction plan
  const plan = useMemo(() => {
    return (recipe.ingredients || []).map(ing => {
      const match = findStockMatch(ing.name, items);
      if (!match) return { ing, status: "missing" };
      const need = ing.amount === "" ? null : Number(ing.amount);
      const have = Number(match.quantity);
      if (need == null) {
        // no amount specified — won't auto-deduct
        return { ing, match, status: "no-amount" };
      }
      if (ing.unit && match.unit && ing.unit !== match.unit) {
        return { ing, match, status: "unit-mismatch" };
      }
      if (have < need) return { ing, match, status: "insufficient", have, need };
      return { ing, match, status: "ok", have, need };
    });
  }, [recipe, items]);

  const [overrides, setOverrides] = useState({}); // ingId -> amount

  const deductions = plan
    .filter(p => p.status === "ok" || p.status === "insufficient")
    .map(p => ({
      itemId: p.match.id,
      amount: overrides[p.ing.name] != null ? Number(overrides[p.ing.name]) : Math.min(p.have, p.need),
    }))
    .filter(d => d.amount > 0);

  return (
    <Sheet onClose={onClose} title={`Cook: ${recipe.name}`}>
      <p className="text-[13px] text-stone-600 mb-3">Review what gets subtracted from your stock:</p>
      <div className="space-y-1.5">
        {plan.map((p, i) => {
          if (p.status === "missing") {
            return (
              <div key={i} className="flex items-center gap-2 px-3 py-2 rounded-lg bg-rose-50 border border-rose-100">
                <span className="h-2 w-2 rounded-full bg-rose-500" />
                <span className="flex-1 text-[13px] font-medium text-rose-700">{p.ing.name}</span>
                <span className="text-[11px] font-semibold text-rose-600">NOT IN STOCK</span>
              </div>
            );
          }
          if (p.status === "no-amount") {
            return (
              <div key={i} className="flex items-center gap-2 px-3 py-2 rounded-lg bg-stone-50 border border-stone-100">
                <span className="h-2 w-2 rounded-full bg-stone-400" />
                <span className="flex-1 text-[13px] font-medium text-stone-700">{p.ing.name}</span>
                <span className="text-[11px] text-stone-500">no amount — skipped</span>
              </div>
            );
          }
          if (p.status === "unit-mismatch") {
            return (
              <div key={i} className="flex items-center gap-2 px-3 py-2 rounded-lg bg-amber-50 border border-amber-100">
                <span className="h-2 w-2 rounded-full bg-amber-500" />
                <span className="flex-1 text-[13px] font-medium text-amber-800">{p.ing.name}</span>
                <span className="text-[11px] text-amber-700">unit mismatch — skipped</span>
              </div>
            );
          }
          const dotColor = p.status === "insufficient" ? "bg-amber-500" : "bg-emerald-500";
          return (
            <div key={i} className="flex items-center gap-2 px-3 py-2 rounded-lg bg-emerald-50 border border-emerald-100">
              <span className={`h-2 w-2 rounded-full ${dotColor}`} />
              <span className="flex-1 text-[13px] font-medium text-stone-800">{p.ing.name}</span>
              <span className="text-[11px] text-stone-600">
                {formatQty(p.have, p.match.unit)} → <strong>{formatQty(Math.max(0, p.have - p.need), p.match.unit)}</strong>
              </span>
            </div>
          );
        })}
      </div>

      <div className="flex gap-2 mt-6">
        <button onClick={onClose}
          className="px-4 py-3 rounded-xl bg-stone-100 text-stone-700 font-semibold active:scale-95 transition">Cancel</button>
        <button onClick={() => onConfirm(deductions)}
          disabled={deductions.length === 0}
          className="flex-1 px-4 py-3 rounded-xl bg-emerald-500 text-white font-semibold disabled:opacity-40 active:scale-[0.98] transition flex items-center justify-center gap-2">
          <Flame size={15} /> Cook & deduct
        </button>
      </div>
    </Sheet>
  );
}
